services:

  db:
    image: postgres:16
    container_name: odoo18-db

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

    restart: always

    volumes:
      - postgres_data:/var/lib/postgresql/data

  odoo:
    build: .

    container_name: odoo18-web

    depends_on:
      - db

    ports:
      - "4069:4069"

    volumes:
      - .:/opt/odoo
      - ./config:/etc/odoo

    restart: always

volumes:
  postgres_data:
